<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - CINESTREAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { content: ["*"], theme: { extend: {} } }</script>
  <style>
    :root {
      --dark:    #09090e;
      --dark-2:  #10101a;
      --dark-3:  #16161f;
      --dark-4:  #1e1e2a;
      --dark-5:  #26263a;
      --border:  rgba(255,255,255,0.07);
      --crimson: #e11d48;
      --crimson-glow: rgba(225,29,72,0.18);
      --emerald: #10b981;
      --emerald-glow: rgba(16,185,129,0.18);
      --rose:    #fb7185;
      --muted:   rgba(255,255,255,0.35);
      --subtle:  rgba(255,255,255,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
    }

    /* ── Ambient glow layer ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(225,29,72,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 100% 100%, rgba(16,185,129,0.05) 0%, transparent 60%);
      z-index: 0;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(9,9,14,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-badge {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--crimson);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 14px rgba(225,29,72,0.4);
    }

    .logo-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: #fff;
    }

    .topbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
    }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: #fff;
      border-color: var(--subtle);
      background: var(--dark-4);
    }

    /* ── Layout ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* UPDATE: 3 → 4 */
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .stat-icon.amber  { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .stat-icon.green  { background: rgba(16,185,129,0.15); color: #34d399; } /* UPDATE: tambah green */
    .stat-icon.sky    { background: rgba(56,189,248,0.15);  color: #38bdf8; }
    .stat-icon.violet { background: rgba(167,139,250,0.15); color: #a78bfa; }

    .stat-label {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    /* ── Section header ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 14px;
      border-radius: 2px;
      background: var(--crimson);
    }

    .badge-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 100px;
      background: var(--crimson);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-left: 8px;
    }

    /* ── Post card ── */
    #admin-feed { display: flex; flex-direction: column; gap: 12px; }

    .post-card {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: slideIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-card:hover {
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    /* thumbnail */
    .thumb {
      width: 112px;
      height: 112px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--dark-5);
      position: relative;
      border: 1px solid var(--border);
    }

    .thumb img, .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb-type {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    /* meta */
    .post-meta { flex: 1; min-width: 0; }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .post-author {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .post-author i { font-size: 11px; }

    .post-date {
      font-size: 11.5px;
      color: rgba(255,255,255,0.2);
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* UPDATE: tambah status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 8px;
    }
    .status-badge.pending  { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
    .status-badge.approved { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }

    /* actions */
    .post-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-approve, .btn-reject, .btn-delete {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 7px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .btn-approve {
      background: rgba(16,185,129,0.15);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.25);
    }

    .btn-approve:hover {
      background: var(--emerald);
      color: #fff;
      border-color: var(--emerald);
      box-shadow: 0 4px 16px rgba(16,185,129,0.35);
    }

    .btn-reject {
      background: rgba(245,158,11,0.12);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.2);
    }

    .btn-reject:hover {
      background: #f59e0b;
      color: #000;
      border-color: #f59e0b;
    }

    /* UPDATE: tambah btn-delete */
    .btn-delete {
      background: rgba(225,29,72,0.12);
      color: var(--rose);
      border: 1px solid rgba(225,29,72,0.2);
    }

    .btn-delete:hover {
      background: var(--crimson);
      color: #fff;
      border-color: var(--crimson);
      box-shadow: 0 4px 16px rgba(225,29,72,0.35);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.18);
    }

    .empty-state i {
      font-size: 40px;
      margin-bottom: 14px;
      display: block;
      color: rgba(255,255,255,0.1);
    }

    .empty-state p {
      font-size: 15px;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .post-card { flex-wrap: wrap; }
      .post-actions { flex-direction: row; width: 100%; }
      .btn-approve, .btn-reject, .btn-delete { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-badge"><i class="fa-solid fa-clapperboard"></i></div>
      <span class="logo-wordmark">CINESTREAM</span>
      <div class="topbar-divider"></div>
      <span class="page-title"><i class="fa-solid fa-shield-halved" style="margin-right:6px;color:var(--crimson)"></i>Admin Panel</span>
    </div>
    <a href="/" class="back-link">
      <i class="fa-solid fa-arrow-left" style="font-size:11px"></i>
      Kembali ke Beranda
    </a>
    <a href="/visits.html" class="back-link" style="margin-right:8px">
  <i class="fa-solid fa-chart-line" style="font-size:11px"></i>
  Visitor Log
</a>
  </header>

  <!-- Page -->
  <div class="page-wrap">

    <!-- Stats: UPDATE tambah stat approved -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon amber"><i class="fa-solid fa-clock"></i></div>
        <div>
          <div class="stat-label">Menunggu</div>
          <div class="stat-value" id="stat-pending">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div>
        <div>
          <div class="stat-label">Approved</div>
          <div class="stat-value" id="stat-approved">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon sky"><i class="fa-solid fa-film"></i></div>
        <div>
          <div class="stat-label">Video</div>
          <div class="stat-value" id="stat-video">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon violet"><i class="fa-solid fa-image"></i></div>
        <div>
          <div class="stat-label">Gambar</div>
          <div class="stat-value" id="stat-image">—</div>
        </div>
      </div>
    </div>

    <!-- UPDATE: Filter tabs -->
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <button id="tab-all"      onclick="setFilter('all',this)"      style="padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--crimson);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;">Semua</button>
      <button id="tab-pending"  onclick="setFilter('pending',this)"  style="padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--dark-3);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;">Pending</button>
      <button id="tab-approved" onclick="setFilter('approved',this)" style="padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--dark-3);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;">Approved</button>
    </div>

    <!-- Feed -->
    <div class="section-head">
      <div class="section-title">Antrean Persetujuan</div>
    </div>

    <div id="admin-feed"></div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    let allPosts = [];
    let currentFilter = 'all';

    async function loadPendingPosts() {
      const res = await fetch('/api/admin/posts', {
        headers: { Authorization: `Bearer ${token}` }
      });
      allPosts = await res.json();

      // UPDATE: stats sekarang hitung semua status
      document.getElementById('stat-pending').textContent  = allPosts.filter(p => p.status === 'pending').length;
      document.getElementById('stat-approved').textContent = allPosts.filter(p => p.status === 'approved').length;
      document.getElementById('stat-video').textContent    = allPosts.filter(p => p.type === 'video').length;
      document.getElementById('stat-image').textContent    = allPosts.filter(p => p.type === 'image').length;

      renderFeed();
    }

    // UPDATE: fungsi filter
    function setFilter(filter, btn) {
      currentFilter = filter;
      ['all', 'pending', 'approved'].forEach(f => {
        const el = document.getElementById('tab-' + f);
        if (!el) return;
        el.style.background = f === filter ? 'var(--crimson)' : 'var(--dark-3)';
        el.style.color      = f === filter ? '#fff'           : 'var(--muted)';
      });
      renderFeed();
    }

    // UPDATE: pisah render dari load
    function renderFeed() {
      const container = document.getElementById('admin-feed');
      const filtered = currentFilter === 'all'
        ? allPosts
        : allPosts.filter(p => p.status === currentFilter);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-circle-check"></i>
            <p>Tidak ada postingan yang menunggu approval</p>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map((p, i) => `
        <div class="post-card" style="animation-delay:${i * 0.05}s">
          <div class="thumb">
            ${p.type === 'image'
              ? `<img src="${p.url}" alt="${p.title}">`
              : `<video src="${p.url}"></video>`}
            <span class="thumb-type">${p.type === 'image' ? 'Foto' : 'Video'}</span>
          </div>
          <div class="post-meta">
            <div class="post-title">${p.title}</div>
            <div class="post-author">
              <i class="fa-solid fa-user"></i> ${p.username}
            </div>
            <div class="post-date">
              <i class="fa-regular fa-clock"></i>
              ${new Date(p.createdAt).toLocaleString('id-ID')}
            </div>
            <!-- UPDATE: status badge -->
            <span class="status-badge ${p.status}">
              <i class="fa-solid ${p.status === 'approved' ? 'fa-check' : 'fa-clock'}"></i>
              ${p.status.toUpperCase()}
            </span>
          </div>
          <div class="post-actions">
            ${p.status !== 'approved' ? `
              <button class="btn-approve" onclick="approvePost('${p.id}')">
                <i class="fa-solid fa-check"></i> Approve
              </button>` : ''}
            ${p.status === 'pending' ? `
              <button class="btn-reject" onclick="rejectPost('${p.id}')">
                <i class="fa-solid fa-xmark"></i> Tolak
              </button>` : ''}
            <!-- UPDATE: tombol hapus -->
            <button class="btn-delete" onclick="deletePost('${p.id}', '${p.title.replace(/'/g, "\\'")}')">
              <i class="fa-solid fa-trash"></i> Hapus
            </button>
          </div>
        </div>
      `).join('');
    }

    async function approvePost(id) {
      await fetch('/api/admin/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: id })
      });
      loadPendingPosts();
    }

    async function rejectPost(id) {
      await fetch('/api/admin/reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: id })
      });
      loadPendingPosts();
    }

    // UPDATE: fungsi delete
    async function deletePost(id, title) {
      if (!confirm(`Hapus "${title}"?\n\nFile di R2 juga akan ikut dihapus permanen.`)) return;
      const res = await fetch('/api/admin/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: id })
      });
      if (res.ok) loadPendingPosts();
      else alert('Gagal menghapus post.');
    }

    window.onload = loadPendingPosts;
  </script>
</body>
</html>
