<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - CINESTREAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></script>
  <script>
    tailwind.config = { content: ["*"] }
    let token = localStorage.getItem('token')

    async function loadAdminPosts() {
      const res = await fetch('/api/admin/posts', {
        headers: { Authorization: `Bearer ${token}` }
      })
      const posts = await res.json()
      const container = document.getElementById('admin-feed')
      container.innerHTML = posts.map(p => `
        <div class="flex gap-6 bg-white p-6 rounded-3xl shadow-sm mb-6 items-center">
          ${p.type === 'image' ? `<img src="${p.url}" class="w-32 h-32 object-cover rounded-2xl">` : `<video src="${p.url}" class="w-32 h-32 object-cover rounded-2xl"></video>`}
          <div class="flex-1">
            <h3 class="font-bold">${p.title}</h3>
            <p class="text-sm text-gray-500">by ${p.username}</p>
          </div>
          <div>
            <button onclick="approve('${p.id}')" class="bg-green-600 text-white px-8 py-3 rounded-3xl mr-3">Approve</button>
            <button onclick="reject('${p.id}')" class="bg-red-600 text-white px-8 py-3 rounded-3xl">Tolak</button>
          </div>
        </div>
      `).join('')
    }

    async function approve(id) {
      await fetch('/api/admin/approve', { method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({postId: id}) })
      loadAdminPosts()
    }
    async function reject(id) {
      await fetch('/api/admin/reject', { method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({postId: id}) })
      loadAdminPosts()
    }

    window.onload = () => {
      if (!token) return location.href = '/login.html'
      loadAdminPosts()
    }
  </script>
</head>
<body class="bg-gray-50">
  <div class="max-w-5xl mx-auto px-6 py-10">
    <h1 class="text-4xl font-bold mb-10 flex items-center gap-3"><i class="fa-solid fa-shield-halved"></i> Admin Panel - Pending Posts</h1>
    <div id="admin-feed"></div>
  </div>
</body>
</html>
