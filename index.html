<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINESTREAM - Public Foto</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      content: ["*"],
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>

  <style>
    body {
      background: #0a0a0a;
      overflow-x: hidden;
    }

    /* Space Nebula Video Background */
    .hero-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.55) contrast(1.15) saturate(1.3);
    }

    .hero-overlay {
      background: linear-gradient(
        180deg, 
        rgba(10,10,25,0.85) 0%, 
        rgba(15,10,35,0.75) 40%, 
        rgba(20,20,50,0.9) 100%
      );
      z-index: -1;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
    }

    .card-hover {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 30px 60px -15px rgb(236 72 153 / 0.3);
    }
  </style>

  <script>
    let token = localStorage.getItem('token')
    let currentUser = null

    async function checkAuth() {
      if (!token) { renderNavbar(); return }
      try {
        const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
        if (res.ok) currentUser = await res.json()
      } catch (e) {}
      renderNavbar()
    }

    function renderNavbar() {
      const nav = document.getElementById('navbar')
      nav.innerHTML = `
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between glass border-b border-white/10 sticky top-0 z-50">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-thumbtack text-4xl text-pink-500"></i>
            <h1 class="text-3xl font-bold tracking-tighter text-white">CINESTREAM</h1>
          </div>
          
          <div class="flex-1 max-w-xl mx-8">
            <input id="search" type="text" placeholder="Cari foto, video, atau creator..."
                   class="w-full bg-white/10 border border-white/20 rounded-full px-6 py-3 text-white placeholder:text-white/50 focus:outline-none focus:border-pink-500">
          </div>

          <div class="flex items-center gap-4">
            ${currentUser ? `
              <button onclick="showUploadModal()" class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-2.5 rounded-full flex items-center gap-2 font-medium transition-all">
                <i class="fa-solid fa-upload"></i> Unggah
              </button>
              ${currentUser.role === 'admin' ? `<a href="/admin.html" class="text-white hover:text-pink-400 font-medium">Admin Panel</a>` : ''}
              <button onclick="logout()" class="text-white/70 hover:text-white font-medium">Logout</button>
            ` : `
              <a href="/login.html" class="text-white/70 hover:text-white font-medium">Masuk</a>
              <a href="/register.html" class="bg-white text-black px-6 py-2.5 rounded-full font-medium hover:bg-gray-200 transition-all">Daftar</a>
            `}
          </div>
        </div>
      `
    }

    function renderHero() {
      const heroHTML = `
        <div class="relative h-screen flex items-center justify-center text-center px-6 overflow-hidden">
          
          <!-- Space Nebula Video Background -->
          <video class="hero-video" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/343/343-large.mp4" type="video/mp4">
            <!-- Fallback jika video gagal load -->
            <source src="https://assets.mixkit.co/videos/preview/754/754-large.mp4" type="video/mp4">
          </video>

          <!-- Overlay -->
          <div class="hero-overlay absolute inset-0"></div>

          <div class="max-w-4xl mx-auto z-10">
            <h1 class="text-6xl md:text-7xl font-bold tracking-tighter text-white mb-4 leading-tight">
              TEMUKAN KREASI<br>
              <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-violet-400">TERBAIKMU</span>
            </h1>
            <p class="text-xl md:text-2xl text-zinc-200 mb-10 max-w-2xl mx-auto">
              Platform berbagi foto & video cinematic untuk kreator Indonesia
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
              <button onclick="document.getElementById('feed').scrollIntoView({ behavior: 'smooth' })" 
                      class="bg-white text-black px-10 py-4 rounded-full font-semibold text-lg hover:bg-gray-100 transition-all flex items-center justify-center gap-3">
                <i class="fa-solid fa-compass"></i> Jelajahi Sekarang
              </button>
              ${!currentUser ? `
              <a href="/register.html" class="border-2 border-white/70 hover:border-white text-white px-10 py-4 rounded-full font-semibold text-lg transition-all">
                Mulai Upload Gratis
              </a>` : ''}
            </div>

            <div class="mt-16 flex justify-center gap-8 text-sm text-zinc-400">
              <div>✦ Ribuan Karya</div>
              <div>✦ Kualitas HD/4K</div>
              <div>✦ Komunitas Kreator</div>
            </div>
          </div>

          <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 animate-bounce z-10">
            <i class="fa-solid fa-chevron-down text-4xl text-white/60"></i>
          </div>
        </div>
      `
      document.getElementById('hero-container').innerHTML = heroHTML
    }

    // ==================== Feed & Fungsi Lainnya ====================
    let allPosts = []
    let displayed = 0
    const PAGE_SIZE = 12

    async function loadPosts() {
      try {
        const res = await fetch('/api/posts?approved=true')
        allPosts = await res.json()
        displayed = 0
        document.getElementById('feed').innerHTML = ''
        renderMorePosts()
      } catch (e) { console.error(e) }
    }

    function renderMorePosts() {
      const container = document.getElementById('feed')
      const start = displayed
      const end = Math.min(start + PAGE_SIZE, allPosts.length)

      for (let i = start; i < end; i++) {
        const p = allPosts[i]
        const card = document.createElement('div')
        card.className = "break-inside-avoid mb-8 cursor-pointer group"
        card.innerHTML = `
          <div class="card-hover bg-zinc-900 rounded-3xl overflow-hidden border border-white/5">
            ${p.type === 'image'
              ? `<img src="${p.url}" class="w-full object-cover aspect-[4/3] group-hover:scale-105 transition-transform duration-500">`
              : `<video src="${p.url}" class="w-full aspect-[4/3] object-cover" muted loop autoplay playsinline></video>`
            }
            <div class="p-5">
              <p class="font-semibold text-lg text-white line-clamp-1">${p.title}</p>
              <p class="text-sm text-zinc-400 mt-1">by ${p.username}</p>
              <div class="flex justify-between items-center mt-4 text-sm">
                <div class="flex items-center gap-1.5 text-pink-400">
                  <i class="fa-solid fa-heart"></i> <span>${p.likes || 0}</span>
                </div>
                <div class="flex items-center gap-1.5 text-zinc-400">
                  <i class="fa-solid fa-comment"></i> <span>${p.comments ? p.comments.length : 0}</span>
                </div>
              </div>
            </div>
          </div>
        `
        card.onclick = () => showPostModal(p)
        container.appendChild(card)
      }

      displayed = end
      if (displayed < allPosts.length) {
        const sentinel = document.createElement('div')
        sentinel.id = 'sentinel'
        container.appendChild(sentinel)
        new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) renderMorePosts()
        }).observe(sentinel)
      }
    }

    let currentPost = null
    function showPostModal(post) { /* Isi dengan modal kode kamu yang lama */ }
    function hideModal() { document.getElementById('modal').classList.add('hidden') }

    window.onload = () => {
      checkAuth()
      renderHero()
      loadPosts()
    }
  </script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <nav id="navbar" class="sticky top-0 z-50"></nav>

  <!-- HERO SECTION -->
  <div id="hero-container"></div>

  <!-- FEED -->
  <div class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold mb-8 text-center">Semua Karya Terbaru</h2>
    <div id="feed" class="columns-1 md:columns-2 lg:columns-3 xl:columns-4 2xl:columns-5 gap-6"></div>
  </div>

  <div id="modal" class="hidden"></div>
</body>
</html>
