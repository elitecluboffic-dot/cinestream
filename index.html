<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINESTREAM - Public Foto</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      content: ["*"],
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>

  <script>
    let token = localStorage.getItem('token')
    let currentUser = null

    async function checkAuth() {
      if (!token) {
        renderNavbar()
        return
      }
      try {
        const res = await fetch('/api/me', {
          headers: { Authorization: `Bearer ${token}` }
        })
        if (res.ok) currentUser = await res.json()
      } catch (e) {}
      renderNavbar()
    }

    function renderNavbar() {
      const nav = document.getElementById('navbar')
      nav.innerHTML = `
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between bg-white shadow-sm">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-thumbtack text-3xl text-pink-600"></i>
            <h1 class="text-2xl font-bold text-gray-900">CINESTREAM</h1>
          </div>
         
          <div class="flex-1 max-w-md mx-8">
            <input id="search" type="text" placeholder="Cari foto atau video..."
                   class="w-full bg-gray-100 border border-gray-300 rounded-3xl px-6 py-3 focus:outline-none focus:border-pink-500">
          </div>
          <div class="flex items-center gap-4">
            ${currentUser ? `
              <button onclick="showUploadModal()" class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-2.5 rounded-3xl flex items-center gap-2 transition-all">
                <i class="fa-solid fa-upload"></i> Unggah
              </button>
              ${currentUser.role === 'admin' ? `<a href="/admin.html" class="font-medium text-gray-700 hover:text-pink-600">Admin Panel</a>` : ''}
              <button onclick="logout()" class="text-gray-700 hover:text-pink-600 font-medium">Logout</button>
            ` : `
              <a href="/login.html" class="font-medium text-gray-700 hover:text-pink-600">Masuk</a>
              <a href="/register.html" class="bg-gray-900 hover:bg-black text-white px-6 py-2.5 rounded-3xl transition-all">Daftar</a>
            `}
          </div>
        </div>
      `
    }

    let allPosts = []
    let displayed = 0
    const PAGE_SIZE = 12

    async function loadPosts() {
      try {
        const res = await fetch('/api/posts?approved=true')
        allPosts = await res.json()
        displayed = 0
        document.getElementById('feed').innerHTML = ''
        renderMorePosts()
      } catch (e) {
        console.error(e)
      }
    }

    function renderMorePosts() {
      const container = document.getElementById('feed')
      const start = displayed
      const end = Math.min(start + PAGE_SIZE, allPosts.length)

      for (let i = start; i < end; i++) {
        const p = allPosts[i]
        const card = document.createElement('div')
        card.className = "break-inside-avoid mb-6 cursor-pointer group"
        card.innerHTML = `
          <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300">
            ${p.type === 'image'
              ? `<img src="${p.url}" class="w-full object-cover aspect-[4/3] group-hover:scale-105 transition-transform duration-300">`
              : `<video src="${p.url}" class="w-full aspect-[4/3] object-cover" muted loop autoplay playsinline></video>`
            }
            <div class="p-4">
              <p class="font-semibold text-gray-900 line-clamp-1">${p.title}</p>
              <p class="text-sm text-gray-500">by ${p.username}</p>
              <div class="flex justify-between items-center mt-3 text-sm">
                <div class="flex items-center gap-1"><i class="fa-solid fa-heart text-pink-500"></i> ${p.likes || 0}</div>
                <div class="flex items-center gap-1"><i class="fa-solid fa-comment"></i> ${p.comments ? p.comments.length : 0}</div>
              </div>
            </div>
          </div>
        `
        card.onclick = () => showPostModal(p)
        container.appendChild(card)
      }

      displayed = end
      if (displayed < allPosts.length) {
        const sentinel = document.createElement('div')
        sentinel.id = 'sentinel'
        container.appendChild(sentinel)
        const observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) {
            observer.disconnect()
            renderMorePosts()
          }
        })
        observer.observe(sentinel)
      }
    }

    let currentPost = null

    function showPostModal(post) {
      currentPost = post
      const modal = document.getElementById('modal')
      modal.classList.remove('hidden')

      modal.innerHTML = `
        <div class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4" onclick="if(event.target.id==='modal') hideModal()">
          
          <div onclick="event.stopImmediatePropagation()" 
               class="bg-zinc-900 rounded-3xl max-w-6xl w-full overflow-hidden shadow-2xl relative">
            
            <!-- Close Button -->
            <button onclick="hideModal()" 
                    class="absolute top-4 right-4 z-50 w-11 h-11 flex items-center justify-center text-4xl text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all duration-200">
              ✕
            </button>

            <div class="flex flex-col lg:flex-row">
              <!-- Media Section -->
              <div class="lg:w-3/5 bg-black flex items-center justify-center p-4">
                ${post.type === 'image'
                  ? `<img src="${post.url}" class="max-h-[85vh] w-full object-contain rounded-2xl">`
                  : `<video src="${post.url}" controls class="max-h-[85vh] w-full rounded-2xl"></video>`
                }
              </div>

              <!-- Info Section -->
              <div class="lg:w-2/5 flex flex-col h-[85vh]">
                <div class="p-6 border-b border-zinc-800">
                  <h2 class="text-2xl font-bold text-white">${post.title}</h2>
                  <p class="text-zinc-400">by ${post.username}</p>
                </div>

                <!-- Like & Comment Count -->
                <div class="p-6 flex gap-8 text-xl border-b border-zinc-800">
                  <button onclick="toggleLike()" class="flex items-center gap-3 text-white hover:text-pink-500 transition-colors">
                    <i class="fa-solid fa-heart ${post.likedBy && post.likedBy.includes(currentUser?.id) ? 'text-pink-500' : 'text-zinc-400'}"></i>
                    <span id="modal-likes" class="text-lg">${post.likes || 0}</span>
                  </button>
                  <div class="flex items-center gap-3 text-zinc-400">
                    <i class="fa-solid fa-comment"></i>
                    <span class="text-lg">${post.comments ? post.comments.length : 0}</span>
                  </div>
                </div>

                <!-- Comments -->
                <div class="flex-1 overflow-y-auto p-6 space-y-5 text-white" id="comments-list">
                  ${(post.comments || []).map(c => `
                    <div>
                      <strong class="text-pink-400">${c.username}</strong>
                      <p class="text-zinc-300 text-[15px] mt-1">${c.text}</p>
                    </div>
                  `).join('')}
                </div>

                <!-- Comment Input -->
                ${currentUser ? `
                  <div class="p-6 border-t border-zinc-800">
                    <div class="flex gap-3">
                      <input id="comment-input" type="text" placeholder="Tulis komentar..."
                             class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-3 text-white focus:outline-none focus:border-pink-500">
                      <button onclick="postComment()" 
                              class="bg-pink-600 hover:bg-pink-700 px-8 rounded-3xl font-medium transition-all">
                        Kirim
                      </button>
                    </div>
                  </div>
                ` : `
                  <div class="p-6 text-center text-zinc-500 border-t border-zinc-800">
                    Login untuk memberikan komentar
                  </div>
                `}
              </div>
            </div>
          </div>
        </div>
      `
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden')
    }

    async function toggleLike() {
      if (!currentUser) return alert('Login dulu')
      const res = await fetch('/api/like', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: currentPost.id })
      })
      if (res.ok) {
        const data = await res.json()
        currentPost.likes = data.likes
        showPostModal(currentPost)
      }
    }

    async function postComment() {
      const input = document.getElementById('comment-input')
      if (!input.value.trim()) return

      const res = await fetch('/api/comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: currentPost.id, text: input.value })
      })
      if (res.ok) {
        const data = await res.json()
        currentPost.comments = data.comments
        input.value = ''
        showPostModal(currentPost)
      }
    }

    function showUploadModal() {
      // (Upload modal tetap sama, hanya sedikit di-improve)
      const modalHTML = `
        <div id="upload-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
          <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4 text-white">
            <h2 class="text-2xl font-bold mb-6">Unggah Foto / Video</h2>
            <form id="upload-form">
              <input type="file" id="file-input" accept="image/*,video/*" 
                     class="block w-full mb-4 bg-zinc-800 border border-zinc-700 rounded-2xl p-4 text-white">
              <input id="title-input" type="text" placeholder="Judul postingan"
                     class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 mb-6 text-white" required>
              <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-3xl text-lg font-medium hover:bg-pink-700">
                Unggah Sekarang
              </button>
            </form>
            <button onclick="document.getElementById('upload-modal').remove()" 
                    class="mt-4 text-zinc-400 hover:text-white w-full py-3">Batal</button>
          </div>
        </div>
      `
      document.body.insertAdjacentHTML('beforeend', modalHTML)
      // ... (event listener tetap sama)
      document.getElementById('upload-form').addEventListener('submit', async e => {
        e.preventDefault()
        const file = document.getElementById('file-input').files[0]
        const title = document.getElementById('title-input').value
        if (!file) return alert('Pilih file terlebih dahulu')
        
        const formData = new FormData()
        formData.append('file', file)
        formData.append('title', title)

        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        })

        if (res.ok) {
          alert('Berhasil diunggah! Menunggu persetujuan admin.')
          document.getElementById('upload-modal').remove()
          loadPosts()
        } else {
          alert('Gagal mengunggah. Silakan coba lagi.')
        }
      })
    }

    function logout() {
      localStorage.removeItem('token')
      location.reload()
    }

    // ESC Key Support
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        const modal = document.getElementById('modal')
        if (!modal.classList.contains('hidden')) hideModal()
      }
    })

    window.onload = () => {
      checkAuth()
      loadPosts()
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <nav id="navbar" class="sticky top-0 bg-white shadow-sm z-50"></nav>
 
  <div class="max-w-7xl mx-auto px-4 pt-8">
    <div id="feed" class="columns-1 md:columns-2 lg:columns-3 xl:columns-4 2xl:columns-5 gap-6"></div>
  </div>
  
  <div id="modal" class="hidden"></div>
</body>
</html>
