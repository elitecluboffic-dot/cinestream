<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINESTREAM - PUBLIC FOTO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = { content: ["*"], theme: { extend: {} } }
    let token = localStorage.getItem('token')
    let currentUser = null

    async function checkAuth() {
      if (!token) return
      const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
      if (res.ok) currentUser = await res.json()
      renderNavbar()
    }

    function renderNavbar() {
      const nav = document.getElementById('navbar')
      nav.innerHTML = `
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-thumbtack text-3xl text-pink-600"></i>
            <h1 class="text-2xl font-bold text-gray-900">CFPin</h1>
          </div>
          <div class="flex-1 max-w-md mx-8">
            <input id="search" type="text" placeholder="Cari foto atau video..." 
                   class="w-full bg-gray-100 border border-gray-300 rounded-3xl px-6 py-3 focus:outline-none focus:border-pink-500">
          </div>
          <div class="flex items-center gap-4">
            ${currentUser ? `
              <button onclick="showUploadModal()" class="bg-pink-600 text-white px-6 py-2 rounded-3xl flex items-center gap-2 hover:bg-pink-700">
                <i class="fa-solid fa-upload"></i> Unggah
              </button>
              ${currentUser.role === 'admin' ? `<a href="/admin.html" class="text-gray-700 hover:text-pink-600 font-medium">Admin Panel</a>` : ''}
              <button onclick="logout()" class="text-gray-700 hover:text-pink-600">Logout</button>
            ` : `
              <a href="/login.html" class="font-medium text-gray-700 hover:text-pink-600">Masuk</a>
              <a href="/register.html" class="bg-gray-900 text-white px-6 py-2 rounded-3xl">Daftar</a>
            `}
          </div>
        </div>
      `
    }

    let allPosts = []
    let displayed = 0
    const PAGE_SIZE = 12

    async function loadPosts() {
      const res = await fetch('/api/posts?approved=true')
      allPosts = await res.json()
      displayed = 0
      renderMorePosts()
    }

    function renderMorePosts() {
      const container = document.getElementById('feed')
      const start = displayed
      const end = Math.min(start + PAGE_SIZE, allPosts.length)
      
      for (let i = start; i < end; i++) {
        const p = allPosts[i]
        const card = document.createElement('div')
        card.className = "break-inside-avoid mb-6 cursor-pointer"
        card.innerHTML = `
          <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all">
            ${p.type === 'image' 
              ? `<img src="${p.url}" class="w-full object-cover" style="aspect-ratio: ${Math.random()*0.6 + 0.8}">`
              : `<video src="${p.url}" class="w-full" muted loop autoplay playsinline></video>`
            }
            <div class="p-4">
              <p class="font-semibold text-gray-900">${p.title}</p>
              <p class="text-sm text-gray-500">by ${p.username}</p>
              <div class="flex justify-between items-center mt-3 text-sm">
                <div class="flex items-center gap-1"><i class="fa-solid fa-heart text-pink-500"></i> ${p.likes}</div>
                <div class="flex items-center gap-1"><i class="fa-solid fa-comment"></i> ${p.comments.length}</div>
              </div>
            </div>
          </div>
        `
        card.onclick = () => showPostModal(p)
        container.appendChild(card)
      }
      displayed = end

      // Infinite scroll sentinel
      if (displayed < allPosts.length) {
        const sentinel = document.createElement('div')
        sentinel.id = 'sentinel'
        container.appendChild(sentinel)
        const observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) {
            observer.disconnect()
            renderMorePosts()
          }
        })
        observer.observe(sentinel)
      }
    }

    let currentPost = null
    function showPostModal(post) {
      currentPost = post
      const modal = document.getElementById('modal')
      modal.classList.remove('hidden')
      modal.innerHTML = `
        <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onclick="if(event.target.id==='modal')hideModal()">
          <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl max-w-4xl w-full mx-4 overflow-hidden">
            <div class="flex flex-col md:flex-row">
              <div class="flex-1">
                ${post.type === 'image' 
                  ? `<img src="${post.url}" class="w-full max-h-[80vh] object-contain">`
                  : `<video src="${post.url}" controls class="w-full max-h-[80vh]"></video>`
                }
              </div>
              <div class="flex-1 p-6">
                <h2 class="text-2xl font-bold">${post.title}</h2>
                <p class="text-gray-500">by ${post.username}</p>
                
                <div class="flex gap-6 my-6">
                  <button onclick="toggleLike()" class="flex items-center gap-2 text-xl">
                    <i class="fa-solid fa-heart ${post.likedBy && post.likedBy.includes(currentUser?.id) ? 'text-pink-500' : ''}"></i>
                    <span id="modal-likes">${post.likes}</span>
                  </button>
                  <div class="flex items-center gap-2 text-xl"><i class="fa-solid fa-comment"></i> ${post.comments.length}</div>
                </div>

                <div class="max-h-96 overflow-y-auto mb-6" id="comments-list">
                  ${post.comments.map(c => `
                    <div class="mb-4">
                      <strong>${c.username}</strong>
                      <p class="text-gray-600">${c.text}</p>
                    </div>
                  `).join('')}
                </div>

                ${currentUser ? `
                  <div class="flex gap-2">
                    <input id="comment-input" type="text" placeholder="Tulis komentar..." 
                           class="flex-1 border border-gray-300 rounded-3xl px-5 py-3 focus:outline-none">
                    <button onclick="postComment()" class="bg-pink-600 text-white px-8 rounded-3xl">Kirim</button>
                  </div>
                ` : `<p class="text-sm text-gray-500">Login untuk komentar</p>`}
              </div>
            </div>
          </div>
        </div>
      `
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden')
    }

    async function toggleLike() {
      if (!currentUser) return alert('Login dulu')
      const res = await fetch('/api/like', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: currentPost.id })
      })
      const data = await res.json()
      currentPost.likes = data.likes
      if (!currentPost.likedBy) currentPost.likedBy = []
      const idx = currentPost.likedBy.indexOf(currentUser.id)
      if (idx > -1) currentPost.likedBy.splice(idx, 1)
      else currentPost.likedBy.push(currentUser.id)
      showPostModal(currentPost) // refresh modal
    }

    async function postComment() {
      const input = document.getElementById('comment-input')
      if (!input.value.trim()) return
      const res = await fetch('/api/comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ postId: currentPost.id, text: input.value })
      })
      const data = await res.json()
      currentPost.comments = data.comments
      input.value = ''
      showPostModal(currentPost)
    }

    function showUploadModal() {
      const modalHTML = `
        <div id="upload-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
          <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">Unggah Foto / Video</h2>
            <form id="upload-form">
              <input type="file" id="file-input" accept="image/*,video/*" class="block w-full mb-4">
              <input id="title-input" type="text" placeholder="Judul" class="w-full border border-gray-300 rounded-3xl px-5 py-4 mb-4" required>
              <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-3xl text-lg font-medium">Unggah Sekarang</button>
            </form>
            <button onclick="document.getElementById('upload-modal').remove()" class="mt-4 text-gray-500">Batal</button>
          </div>
        </div>
      `
      document.body.insertAdjacentHTML('beforeend', modalHTML)

      document.getElementById('upload-form').addEventListener('submit', async e => {
        e.preventDefault()
        const file = document.getElementById('file-input').files[0]
        const title = document.getElementById('title-input').value
        if (!file) return alert('Pilih file')

        const formData = new FormData()
        formData.append('file', file)
        formData.append('title', title)

        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        })

        if (res.ok) {
          alert('Berhasil diunggah! Menunggu approval admin.')
          document.getElementById('upload-modal').remove()
          loadPosts()
        } else {
          alert('Gagal upload')
        }
      })
    }

    function logout() {
      localStorage.removeItem('token')
      location.reload()
    }

    window.onload = () => {
      checkAuth()
      loadPosts()
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <nav id="navbar" class="sticky top-0 bg-white shadow-sm z-50"></nav>
  
  <div class="max-w-7xl mx-auto px-4 pt-8">
    <div id="feed" class="columns-1 md:columns-2 lg:columns-3 xl:columns-4 2xl:columns-5 gap-6"></div>
  </div>

  <div id="modal" class="hidden"></div>
</body>
</html>
