<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINESTREAM - Public Foto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      content: ["*"],
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: #f8fafc;
    }
    
    .card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
    }

    .feed-card img, .feed-card video {
      transition: transform 0.5s ease;
    }
    .feed-card:hover img,
    .feed-card:hover video {
      transform: scale(1.06);
    }
  </style>

  <script>
    let token = localStorage.getItem('token')
    let currentUser = null

    async function checkAuth() {
      if (!token) {
        renderNavbar()
        return
      }
      try {
        const res = await fetch('/api/me', {
          headers: { Authorization: `Bearer ${token}` }
        })
        if (res.ok) currentUser = await res.json()
      } catch (e) {}
      renderNavbar()
    }

    function renderNavbar() {
      const nav = document.getElementById('navbar')
      nav.innerHTML = `
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between navbar border-b border-gray-100 sticky top-0 z-50 shadow-sm">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-thumbtack text-4xl text-pink-600"></i>
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">CINESTREAM</h1>
          </div>
        
          <div class="flex-1 max-w-md mx-8">
            <input id="search" type="text" placeholder="Cari foto atau video..."
                   class="w-full bg-gray-100 border border-gray-200 rounded-3xl px-6 py-3 focus:outline-none focus:border-pink-500 transition-all text-sm">
          </div>

          <div class="flex items-center gap-4">
            ${currentUser ? `
              <button onclick="showUploadModal()" class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-2.5 rounded-3xl flex items-center gap-2 transition-all font-medium">
                <i class="fa-solid fa-upload"></i> Unggah
              </button>
              ${currentUser.role === 'admin' ? `<a href="/admin.html" class="font-medium text-gray-700 hover:text-pink-600">Admin Panel</a>` : ''}
              <button onclick="logout()" class="text-gray-700 hover:text-pink-600 font-medium px-4 py-2">Logout</button>
            ` : `
              <a href="/login.html" class="font-medium text-gray-700 hover:text-pink-600">Masuk</a>
              <a href="/register.html" class="bg-gray-900 hover:bg-black text-white px-6 py-2.5 rounded-3xl transition-all font-medium">Daftar</a>
            `}
          </div>
        </div>
      `
    }

    let allPosts = []
    let displayed = 0
    const PAGE_SIZE = 12

    async function loadPosts() {
      try {
        const res = await fetch('/api/posts?approved=true')
        allPosts = await res.json()
        displayed = 0
        document.getElementById('feed').innerHTML = ''
        renderMorePosts()
      } catch (e) {
        console.error(e)
      }
    }

    function renderMorePosts() {
      const container = document.getElementById('feed')
      const start = displayed
      const end = Math.min(start + PAGE_SIZE, allPosts.length)

      for (let i = start; i < end; i++) {
        const p = allPosts[i]
        const card = document.createElement('div')
        card.className = "break-inside-avoid mb-8 cursor-pointer group"
        card.innerHTML = `
          <div class="card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
            ${p.type === 'image'
              ? `<img src="${p.url}" class="w-full object-cover aspect-[4/3] group-hover:scale-105 transition-transform duration-500">`
              : `<video src="${p.url}" class="w-full aspect-[4/3] object-cover" muted loop autoplay playsinline></video>`
            }
            <div class="p-5">
              <p class="font-semibold text-lg text-gray-900 line-clamp-2">${p.title}</p>
              <p class="text-sm text-gray-500 mt-1">by ${p.username}</p>
              
              <div class="flex justify-between items-center mt-4">
                <div class="flex items-center gap-1.5 text-pink-600">
                  <i class="fa-solid fa-heart"></i>
                  <span class="font-medium">${p.likes || 0}</span>
                </div>
                <div class="flex items-center gap-1.5 text-gray-500">
                  <i class="fa-solid fa-comment"></i>
                  <span>${p.comments ? p.comments.length : 0}</span>
                </div>
              </div>
            </div>
          </div>
        `
        card.onclick = () => showPostModal(p)
        container.appendChild(card)
      }

      displayed = end
      if (displayed < allPosts.length) {
        const sentinel = document.createElement('div')
        sentinel.id = 'sentinel'
        container.appendChild(sentinel)
        const observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) {
            observer.disconnect()
            renderMorePosts()
          }
        })
        observer.observe(sentinel)
      }
    }

    // Modal, Upload, Like, Comment, Logout tetap sama seperti kode kamu
    let currentPost = null
    function showPostModal(post) { /* kode modal kamu tetap */ }
    function hideModal() { document.getElementById('modal').classList.add('hidden') }
    async function toggleLike() { /* kode lama */ }
    async function postComment() { /* kode lama */ }
    function showUploadModal() { /* kode lama */ }

    function logout() {
      localStorage.removeItem('token')
      location.reload()
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        const modal = document.getElementById('modal')
        if (!modal.classList.contains('hidden')) hideModal()
      }
    })

    window.onload = () => {
      checkAuth()
      loadPosts()
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <nav id="navbar" class="sticky top-0 bg-white shadow-sm z-50"></nav>
  
  <div class="max-w-7xl mx-auto px-6 pt-10">
    <div id="feed" class="columns-1 md:columns-2 lg:columns-3 xl:columns-4 2xl:columns-5 gap-8"></div>
  </div>

  <div id="modal" class="hidden"></div>
</body>
</html>
