<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - CINESTREAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = { content: ["*"], theme: { extend: {} } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-xl p-10 w-full max-w-md">
    <div class="flex justify-center mb-8">
      <i class="fa-solid fa-thumbtack text-6xl text-pink-600"></i>
    </div>
    <h1 class="text-3xl font-bold text-center mb-8">Masuk ke CINESTREAM</h1>
    
    <form id="login-form">
      <input name="email" type="email" placeholder="Email" required 
             class="w-full border border-gray-300 rounded-3xl px-6 py-4 mb-4 focus:outline-none focus:border-pink-500">
      <input name="password" type="password" placeholder="Password" required 
             class="w-full border border-gray-300 rounded-3xl px-6 py-4 mb-8 focus:outline-none focus:border-pink-500">
      <button type="submit" 
              class="w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-3xl text-lg font-medium transition-all">
        Masuk
      </button>
    </form>
    
    <p class="text-center mt-6 text-gray-500">
      Belum punya akun? <a href="/register.html" class="text-pink-600 font-medium">Daftar sekarang</a>
    </p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const form = new FormData(e.target)
      const res = await fetch('/api/login', { method: 'POST', body: form })
      const data = await res.json()
      
      if (data.token) {
        localStorage.setItem('token', data.token)
        window.location.href = '/'
      } else {
        alert(data.error || 'Login gagal')
      }
    })
  </script>
</body>
</html>
