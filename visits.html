<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Log - CINESTREAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #09090e; --dark-3: #16161f; --dark-4: #1e1e2a;
      --border: rgba(255,255,255,0.07); --crimson: #e11d48;
      --muted: rgba(255,255,255,0.35); --subtle: rgba(255,255,255,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9,9,14,0.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo-badge {
      width: 34px; height: 34px; border-radius: 8px; background: var(--crimson);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      box-shadow: 0 0 14px rgba(225,29,72,0.4);
    }
    .logo-wordmark { font-size: 18px; font-weight: 800; letter-spacing: 2px; }
    .topbar-divider { width: 1px; height: 22px; background: var(--border); }
    .page-title { font-size: 13px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
    .back-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      text-decoration: none; padding: 7px 14px; border-radius: 6px;
      border: 1px solid var(--border); transition: all 0.2s;
    }
    .back-link:hover { color: #fff; border-color: var(--subtle); background: var(--dark-4); }
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--dark-3); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .stat-icon.sky    { background: rgba(56,189,248,0.15); color: #38bdf8; }
    .stat-icon.violet { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .stat-icon.amber  { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .stat-label { font-size: 11.5px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 10px 14px; text-align: left; }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    td { font-size: 13px; padding: 12px 14px; color: rgba(255,255,255,0.75); }
    .country-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 100px;
      background: rgba(56,189,248,0.1); color: #38bdf8;
      border: 1px solid rgba(56,189,248,0.2);
      font-size: 11px; font-weight: 700;
    }
    .ip-text { font-family: monospace; font-size: 12.5px; color: #a78bfa; }
    .section-title {
      font-size: 13px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .section-title::before { content: ''; width: 3px; height: 14px; border-radius: 2px; background: var(--crimson); }
    .ua-text { font-size: 11.5px; color: rgba(255,255,255,0.3); max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-badge"><i class="fa-solid fa-clapperboard"></i></div>
      <span class="logo-wordmark">CINESTREAM</span>
      <div class="topbar-divider"></div>
      <span class="page-title"><i class="fa-solid fa-chart-line" style="margin-right:6px;color:var(--crimson)"></i>Visitor Log</span>
    </div>
    <a href="/admin.html" class="back-link">
      <i class="fa-solid fa-arrow-left" style="font-size:11px"></i>
      Admin Panel
    </a>
  </header>

  <div class="page-wrap">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon sky"><i class="fa-solid fa-users"></i></div>
        <div><div class="stat-label">Total Visit</div><div class="stat-value" id="stat-total">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon violet"><i class="fa-solid fa-earth-asia"></i></div>
        <div><div class="stat-label">Negara Unik</div><div class="stat-value" id="stat-country">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber"><i class="fa-solid fa-fingerprint"></i></div>
        <div><div class="stat-label">IP Unik</div><div class="stat-value" id="stat-ip">—</div></div>
      </div>
    </div>

    <div class="section-title">Log Pengunjung</div>

    <table>
      <thead>
        <tr>
          <th>Waktu</th>
          <th>IP</th>
          <th>Negara</th>
          <th>Halaman</th>
          <th>User Agent</th>
        </tr>
      </thead>
      <tbody id="visit-table"></tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    async function loadVisits() {
      const res = await fetch('/api/admin/visits', {
        headers: { Authorization: `Bearer ${token}` }
      });
      const visits = await res.json();

      document.getElementById('stat-total').textContent   = visits.length;
      document.getElementById('stat-country').textContent = new Set(visits.map(v => v.country)).size;
      document.getElementById('stat-ip').textContent      = new Set(visits.map(v => v.ip)).size;

      document.getElementById('visit-table').innerHTML = visits.map(v => `
        <tr>
          <td>${new Date(v.timestamp).toLocaleString('id-ID')}</td>
          <td><span class="ip-text">${v.ip}</span></td>
          <td><span class="country-badge"><i class="fa-solid fa-location-dot"></i> ${v.country}</span></td>
          <td style="font-size:11.5px;color:rgba(255,255,255,0.4)">${v.url}</td>
          <td><div class="ua-text" title="${v.userAgent}">${v.userAgent}</div></td>
        </tr>
      `).join('');
    }

    window.onload = loadVisits;
  </script>
</body>
</html>
